<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Пункт выдачи заказов на Тищенко, 2. Озон, Wildberries.">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.png" type="image/png">

  <!-- Яндекс.Метрика -->
  <script>
    (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
    m[i].l=1*new Date();
    for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
    k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})

  </script>
  <noscript><div><img src="https://mc.yandex.ru/watch/109024144" style="position:absolute;left:-9999px;" alt=""></div></noscript>
</head>
<body>
  <!-- Окно загрузки -->
  <div id="loading-screen">
    <div class="loader-container">
      <div class="loader"></div>
      <div class="loader-text">Загрузка...</div>
      <div class="loader-subtext">ПВЗ на Тищенко, 2</div>
    </div>
  </div>

  <div class="main-container" id="main-content">
    <div class="card">
      <div class="avatar-wrapper">
        <img src="logo.png" alt="Логотип ПВЗ" class="avatar">
      </div>
      <h1 class="title">ПВЗ на Тищенко, 2</h1>
      <p class="subtitle">Для лучшего качества скриншотов открывайте инструкции через компьютер</p>
      <div class="button-group">
        <a href="https://ozon.ru/point/1402634" target="_blank" rel="noopener noreferrer" class="menu-button">
          <span class="btn-icon">📍</span>
          <span class="btn-text">Адрес пункта Озон</span>
        </a>
        <a href="https://dzen.ru/a/aeh5mmCZ_2Jl9kNS?share_to=link" target="_blank" rel="noopener noreferrer" class="menu-button">
          <span class="btn-icon">📦</span>
          <span class="btn-text">Как заказать товары с WB?</span>
        </a>
        <a href="https://dzen.ru/a/aei7_9gcLjiKbk3D?share_to=link" target="_blank" rel="noopener noreferrer" class="menu-button">
          <span class="btn-icon">🔄</span>
          <span class="btn-text">Как оформить возврат товаров?</span>
        </a>
        <button id="install-banner" class="menu-button" aria-label="Установить приложение">
          <span class="btn-icon">📲</span>
          <span class="btn-text">Установить на экран</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Декоративные элементы -->
  <div class="bg-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>

  <script>
    // Окно загрузки
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loadingScreen = document.getElementById('loading-screen');
        loadingScreen.classList.add('fade-out');
        setTimeout(() => {
          loadingScreen.style.display = 'none';
        }, 500);
      }, 1500);
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('✅ SW зарегистрирован'))
        .catch(err => console.error('❌ Ошибка SW:', err));
    }

    // ========== Логика для Android (Chrome / Edge) ==========
    let deferredPrompt;
    const installBtn = document.getElementById('install-banner');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'flex';
    });

    installBtn.onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('📲 Установка PWA:', outcome);
      deferredPrompt = null;
      installBtn.style.display = 'none';
    };

    // Если приложение уже установлено — скрываем кнопку
    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      deferredPrompt = null;
      console.log('✅ PWA успешно установлено');
    });

    // Добавляем анимацию при появлении карточек
    document.addEventListener('DOMContentLoaded', () => {
      const card = document.querySelector('.card');
      if (card) {
        card.style.opacity = '0';
        card.style.transform = 'translateY(30px)';
        setTimeout(() => {
          card.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
        }, 100);
      }
    });
  </script>
</body>
</html>
