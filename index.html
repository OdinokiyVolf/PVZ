<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВЗ на Тищенко, 2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a7c59">
</head>
<body>
    <div class="main-container">
        <div class="card">
            <h1 class="title">ПВЗ на Тищенко, 2</h1>
            
            <div class="button-group">
                <button class="menu-button" onclick="location.href='#'">Адрес пункта Озон</button>
                <button class="menu-button" onclick="location.href='#'">Как заказывать товары с WB?</button>
                <button class="menu-button" onclick="location.href='#'">Как оформить возврат товаров?</button>
            </div>
        </div>
    </div>

    <button class="settings-fab">
        <img src="https://img.icons8.com/ios-glyphs/30/ffffff/settings--v1.png" alt="Settings">
    </button>

    <script src="sw.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("PWA зарегистрирован"));
        }
    </script>
</body>
</html>
